<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#f8fafc,#eef6ff,#ffffff);
            min-height:100vh;
            overflow:hidden;
            font-family: 'Segoe UI',sans-serif;
        }

        .chat-container{
            height:100vh;
            max-width:1200px;
            margin:auto;
            padding:20px;
        }

        .chat-card{
            height:100%;
            display:flex;
            flex-direction:column;
            border-radius:24px;
            overflow:hidden;

            background:rgba(255,255,255,.95);
            backdrop-filter:blur(18px);

            border:1px solid rgba(0,0,0,.08);

            box-shadow:
                0 10px 40px rgba(0,0,0,.08),
                0 0 50px rgba(37,99,235,.10);
        }

        .chat-header{
            padding:20px 25px;
            border-bottom:1px solid rgba(0,0,0,.08);
        }

        .logo-circle{
            width:45px;
            height:45px;
            border-radius:50%;
            background:linear-gradient(135deg,#06b6d4,#3b82f6);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:20px;
            color:white;
        }

        .chat-messages{
            flex:1;
            overflow-y:auto;
            padding:25px;
        }

        .chat-messages::-webkit-scrollbar{
            width:8px;
        }

        .chat-messages::-webkit-scrollbar-thumb{
            background:#cbd5e1;
            border-radius:20px;
        }

        .message{
            display:flex;
            margin-bottom:20px;
            animation:fadeIn .3s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(10px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .message.user{
            justify-content:flex-end;
        }

        .message.assistant{
            justify-content:flex-start;
        }

        .avatar{
            width:42px;
            height:42px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            margin-right:12px;
            flex-shrink:0;
            font-size:18px;
        }

        .ai-avatar{
            background:linear-gradient(135deg,#06b6d4,#0ea5e9);
            color:white;
        }

        .bubble{
            padding:14px 18px;
            max-width:75%;
            border-radius:18px;
            word-wrap:break-word;
            line-height:1.6;
        }

        .user .bubble{
            background:linear-gradient(135deg,#2563eb,#3b82f6);
            color:white;
            border-bottom-right-radius:6px;
            box-shadow:0 5px 20px rgba(37,99,235,.25);
        }

        .assistant .bubble{
            background:#f1f5f9;
            color:#1e293b;
            border-bottom-left-radius:6px;
            border:1px solid rgba(0,0,0,.08);
        }

        .chat-input{
            padding:20px;
            border-top:1px solid rgba(0,0,0,.08);
            background:rgba(248,250,252,.5);
        }

        .chat-input textarea{
            resize:none;
            border-radius:15px;
            border:1px solid #cbd5e1;
            background:#f8fafc;
            color:#1e293b;
            min-height:60px;
        }

        .chat-input textarea:focus{
            background:#f8fafc;
            color:#1e293b;
            border-color:#3b82f6;
            box-shadow:none;
        }

        .send-btn{
            border:none;
            border-radius:15px;
            padding:0 25px;
            font-weight:600;
            background:linear-gradient(135deg,#f59e0b,#f97316);
            color:white;
        }

        .send-btn:hover{
            transform:translateY(-2px);
            transition:.3s;
        }

        .welcome-box{
            text-align:center;
            margin-top:80px;
            color:#64748b;
        }

        .welcome-box h3{
            color:#1e293b;
        }

        .status-dot{
            width:10px;
            height:10px;
            border-radius:50%;
            background:#22c55e;
            display:inline-block;
            margin-right:6px;
        }

        .model-badge{
            background:#f1f5f9;
            border:1px solid #cbd5e1;
            padding:6px 12px;
            border-radius:30px;
            font-size:13px;
            color:#1e293b;
        }

    </style>
</head>

<body>
<!-- HEADER -->
<div class="glass-header">
    <!-- ... header content ... -->
</div>

<!-- SUCCESS MESSAGE -->
<div th:if="${message}"
     class="alert alert-success mt-4"
     th:text="${message}">
</div>

<!-- UPLOAD SECTION -->
<div class="row g-4 mt-2">
    <!-- ... upload cards ... -->
</div>

<div class="chat-container">

    <div class="chat-card">

        <!-- HEADER -->
        <div class="chat-header">

            <div class="d-flex justify-content-between align-items-center">

                <div class="d-flex align-items-center gap-3">

                    <div class="logo-circle">
                        🤖
                    </div>

                    <div>
                        <h4 class="mb-0" style="color:#1e293b;">
                            AI Assistant
                        </h4>

                        <small class="text-muted">
                            Ask questions from your uploaded documents
                        </small>
                    </div>

                </div>

                <div class="d-flex align-items-center gap-3">

                    <span class="model-badge">
                        <span class="status-dot"></span>
                        Llama 3 · Ollama
                    </span>

                    <a href="/upload"
                       class="btn btn-outline-info">
                        📂 Upload Documents
                    </a>

                </div>

            </div>

        </div>

        <!-- CHAT HISTORY -->
        <div class="chat-messages" id="chatMessages">

            <div th:if="${#lists.isEmpty(history)}"
                 class="welcome-box">

                <h3>👋 Welcome</h3>

                <p>
                    Start a conversation with your AI assistant.
                </p>

            </div>

            <div th:each="m : ${history}">

                <!-- USER MESSAGE -->
                <div th:if="${m.role=='user'}"
                     class="message user">

                    <div class="bubble">

                        <div class="fw-bold small mb-1">
                            You
                        </div>

                        <div th:text="${m.text}">
                            User Message
                        </div>

                    </div>

                </div>

                <!-- ASSISTANT MESSAGE -->
                <div th:if="${m.role=='assistant'}"
                     class="message assistant">

                    <div class="avatar ai-avatar">
                        🤖
                    </div>

                    <div class="bubble">

                        <div class="fw-bold small mb-1" style="color:#0ea5e9;">
                            Assistant
                        </div>

                        <div th:text="${m.text}">
                            Assistant Response
                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- INPUT AREA -->
        <div class="chat-input">

            <form th:action="@{/chat}"
                  method="post">

                <div class="input-group">

                    <textarea
                            class="form-control"
                            name="question"
                            id="question"
                            placeholder="Type your question here..."
                            required></textarea>

                    <button
                            class="btn send-btn"
                            type="submit">

                        🚀 Send

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script>

    window.onload = function() {

        const chatBox =
            document.getElementById("chatMessages");

        chatBox.scrollTop =
            chatBox.scrollHeight;
    };

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
