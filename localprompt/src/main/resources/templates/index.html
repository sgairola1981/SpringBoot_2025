<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Oracle AI Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <h2 class="mb-4">Oracle 11g AI Upload + Chat</h2>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${answer}" class="alert alert-info" th:text="${answer}"></div>

    <div class="row g-3">
        <div class="col-md-4">
            <div class="card p-3 mb-3">
                <h5>Upload File</h5>
                <form th:action="@{/upload-file}" method="post" enctype="multipart/form-data">
                    <input type="file" name="file" class="form-control mb-2" required>
                    <button class="btn btn-primary w-100">Upload</button>
                </form>
            </div>

            <div class="card p-3 mb-3">
                <h5>Store URL</h5>
                <form th:action="@{/upload-url}" method="post">
                    <input type="url" name="url" class="form-control mb-2" placeholder="https://example.com" required>
                    <button class="btn btn-success w-100">Store URL</button>
                </form>
            </div>

            <div class="card p-3">
                <h5>Stored Sources</h5>
                <ul class="list-group">
                    <li class="list-group-item" th:each="f : ${files}">
                        <b th:text="${f.filename}"></b><br>
                        <small th:text="${f.sourceType}"></small>
                    </li>
                </ul>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card p-3">
                <h5>Ask Question</h5>
                <form th:action="@{/chat}" method="post">
                    <textarea name="question" class="form-control mb-2" rows="6"
                              placeholder="Ask something from uploaded documents or URLs"></textarea>
                    <button class="btn btn-warning w-100">Get Answer</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
