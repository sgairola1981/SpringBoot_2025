<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Knowledge Base</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>

        body{
            min-height:100vh;
            background:linear-gradient(
                    135deg,
                    #f8fafc 0%,
                    #eef6ff 50%,
                    #ffffff 100%);
            font-family:'Segoe UI',sans-serif;
        }

        .app-shell{
            max-width:1400px;
        }

        .glass-header{
            background:#ffffff;
            border-radius:24px;
            padding:25px;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
            border:1px solid #e2e8f0;
            margin-top:20px;
        }

        .logo-circle{
            width:65px;
            height:65px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            background:linear-gradient(135deg,#2563eb,#06b6d4);
            color:white;
            font-size:28px;
        }

        .upload-card{
            background:#ffffff;
            border-radius:24px;
            padding:30px;
            border:none;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
            transition:.3s;
            height:100%;
        }

        .upload-card:hover{
            transform:translateY(-5px);
            box-shadow:0 20px 40px rgba(37,99,235,.15);
        }

        .upload-icon{
            width:90px;
            height:90px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            color:white;
            font-size:38px;
            margin:auto auto 20px;
        }

        .blue{
            background:linear-gradient(135deg,#2563eb,#3b82f6);
        }

        .green{
            background:linear-gradient(135deg,#10b981,#22c55e);
        }

        .stat-card{
            background:white;
            border-radius:20px;
            padding:25px;
            text-align:center;
            box-shadow:0 8px 20px rgba(0,0,0,.08);
            height:100%;
        }

        .stat-card i{
            font-size:40px;
            color:#2563eb;
        }

        .knowledge-card{
            background:white;
            border-radius:24px;
            padding:30px;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }

        .source-item{
            background:#f8fafc;
            border:1px solid #e2e8f0;
            border-radius:15px;
            padding:18px;
            margin-bottom:12px;
            transition:.3s;
        }

        .source-item:hover{
            background:#eff6ff;
            border-color:#93c5fd;
        }

        .source-link{
            text-decoration:none;
            color:#2563eb;
            font-weight:600;
        }

        .source-link:hover{
            color:#1d4ed8;
        }

        .section-title{
            color:#64748b;
            text-transform:uppercase;
            letter-spacing:2px;
            font-size:12px;
            font-weight:600;
        }

        .hero-title{
            font-size:2rem;
            font-weight:700;
        }

        .hero-subtitle{
            color:#64748b;
        }

        .btn-custom{
            border-radius:12px;
            padding:10px 20px;
            font-weight:600;
        }

    </style>

</head>

<body>

<div class="container app-shell">

    <!-- HEADER -->

    <div class="glass-header">

        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">

            <div class="d-flex align-items-center gap-3">

                <div class="logo-circle">
                    <i class="bi bi-robot"></i>
                </div>

                <div>
                    <div class="hero-title">
                        AI Knowledge Base
                    </div>

                    <div class="hero-subtitle">
                        Upload files and websites for AI-powered chat responses
                    </div>
                </div>

            </div>

            <a href="/"
               class="btn btn-warning btn-custom">
                <i class="bi bi-chat-dots-fill me-2"></i>
                Open Chat
            </a>

        </div>

    </div>

    <!-- SUCCESS MESSAGE -->

    <div th:if="${message}"
         class="alert alert-success mt-4"
         th:text="${message}">
    </div>

    <!-- UPLOAD SECTION -->

    <div class="row g-4 mt-2">

        <!-- FILE UPLOAD -->

        <div class="col-lg-6">

            <div class="upload-card">

                <div class="upload-icon blue">
                    <i class="bi bi-cloud-arrow-up-fill"></i>
                </div>

                <h3 class="text-center mb-2">
                    Upload Documents
                </h3>

                <p class="text-center text-muted mb-4">
                    Upload PDF, DOC, DOCX or TXT files
                </p>

                <form th:action="@{/upload-file}"
                      method="post"
                      enctype="multipart/form-data">

                    <input type="file"
                           name="file"
                           class="form-control form-control-lg mb-3"
                           required>

                    <button type="submit"
                            class="btn btn-primary btn-lg w-100">

                        <i class="bi bi-upload me-2"></i>
                        Upload to Knowledge Base

                    </button>

                </form>

            </div>

        </div>

        <!-- URL UPLOAD -->

        <div class="col-lg-6">

            <div class="upload-card">

                <div class="upload-icon green">
                    <i class="bi bi-globe"></i>
                </div>

                <h3 class="text-center mb-2">
                    Import Website
                </h3>

                <p class="text-center text-muted mb-4">
                    Store webpage content for AI search
                </p>

                <form th:action="@{/upload-url}"
                      method="post">

                    <input type="url"
                           name="url"
                           class="form-control form-control-lg mb-3"
                           placeholder="https://example.com"
                           required>

                    <button type="submit"
                            class="btn btn-success btn-lg w-100">

                        <i class="bi bi-link-45deg me-2"></i>
                        Save Website

                    </button>

                </form>

            </div>

        </div>

    </div>

    <!-- STATS -->

    <div class="row g-4 mt-2">

        <div class="col-md-4">

            <div class="stat-card">

                <i class="bi bi-files"></i>

                <h2 class="mt-3"
                    th:text="${files != null ? #lists.size(files) : 0}">
                    0
                </h2>

                <p class="text-muted">
                    Total Sources
                </p>

            </div>

        </div>

        <div class="col-md-4">

            <div class="stat-card">

                <i class="bi bi-database-fill"></i>

                <h2 class="mt-3">
                    Oracle
                </h2>

                <p class="text-muted">
                    Database Connected
                </p>

            </div>

        </div>

        <div class="col-md-4">

            <div class="stat-card">

                <i class="bi bi-cpu-fill"></i>

                <h2 class="mt-3">
                    AI Ready
                </h2>

                <p class="text-muted">
                    Knowledge Engine Active
                </p>

            </div>

        </div>

    </div>


    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
