spring.application.name=ollama
server.port=9999

# Ollama connection

spring.ai.ollama.embedding.options.model=nomic-embed-text

spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3:latest
spring.ai.ollama.chat.options.temperature=0.3
spring.ai.ollama.chat.options.num-predict=2048
#spring.ai.ollama.chat.options.num-ctx=8192

spring.thymeleaf.cache=false

# Oracle 11g
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XE
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=HR
spring.datasource.password=hr

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.OracleLegacyDialect
spring.jpa.open-in-view=false

# File upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.web.resources.static-locations=classpath:/static/,file:uploads/

