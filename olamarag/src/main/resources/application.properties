spring.application.name=ollama-rag
server.port=9999

spring.ai.ollama.base-url=http://localhost:11434

spring.ai.ollama.chat.options.model=mistral:latest
spring.ai.ollama.chat.options.temperature=0.7
spring.ai.ollama.chat.options.num-predict=200

spring.ai.ollama.embedding.options.model=nomic-embed-text

spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XE
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=HR
spring.datasource.password=hr

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.OracleLegacyDialect
spring.jpa.open-in-view=false

spring.thymeleaf.cache=false