<!DOCTYPE html>
<html>
<head>
    <title>Local LLM Chat</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: #1f1f1f;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 70%;
            padding: 12px 16px;
            margin: 6px 0;
            border-radius: 15px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user {
            align-self: flex-end;
            background-color: #007bff;
            color: white;
        }

        .bot {
            align-self: flex-start;
            background-color: #e4e6eb;
            color: black;
        }

        #input-area {
            display: flex;
            padding: 12px;
            background: white;
            border-top: 1px solid #ccc;
        }

        #question {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border-radius: 10px;
            border: 1px solid #ccc;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 12px 18px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            background: #28a745;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }
    </style>
</head>
<body>

<header>
    🤖 Local LLM Chat (Spring Boot + Ollama)
</header>

<div id="chat-container"></div>

<div id="input-area">
    <input type="text" id="question" placeholder="Ask something..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>

    function sendMessage() {

        const input = document.getElementById("question");
        const question = input.value.trim();
        if (!question) return;

        addMessage(question, "user");
        input.value = "";

        const botDiv = addMessage("", "bot");

        const eventSource = new EventSource(
            "/api/llm/stream?question=" + encodeURIComponent(question)
        );

        eventSource.onmessage = function(event) {
            // Add space between tokens to avoid word merging
            botDiv.textContent += event.data;
            scrollToBottom();
        };

        eventSource.onerror = function() {
            eventSource.close();
        };
    }

    function addMessage(text, type) {
        const div = document.createElement("div");
        div.classList.add("message", type);
        div.textContent = text;
        document.getElementById("chat-container").appendChild(div);
        scrollToBottom();
        return div;
    }

    function scrollToBottom() {
        const chat = document.getElementById("chat-container");
        chat.scrollTop = chat.scrollHeight;
    }

    // Press Enter to send
    document.getElementById("question")
        .addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });

</script>

</body>
</html>
