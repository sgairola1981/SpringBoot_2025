<!DOCTYPE html>
<html>
<head>
    <title>AI Chat</title>
    <style>

        body{font-family:Arial;background:#f5f5f5}

        .container{
        width:600px;
        margin:50px auto;
        background:white;
        padding:20px;
        border-radius:10px
        }

        #chatBox{
        height:400px;
        overflow:auto;
        border:1px solid #ddd;
        padding:10px
        }

        .user{color:blue;text-align:right;margin:5px}

        .bot{color:green;margin:5px}

    </style>
</head>

<body>

<div class="container">

    <h2>🤖 Local AI Assistant</h2>

    <div id="chatBox"></div>

    <input id="message" style="width:80%">
    <button onclick="send()">Send</button>

</div>

<script>

    async function send(){

    let msg=document.getElementById("message").value

    let box=document.getElementById("chatBox")

    box.innerHTML+=`<div class="user">${msg}</div>`

    let res=await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
    })

    let text=await res.text()

    box.innerHTML+=`<div class="bot">${text}</div>`

    }

</script>

</body>
</html>
