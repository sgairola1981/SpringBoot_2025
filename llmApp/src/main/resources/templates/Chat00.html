<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>RAG AI Assistant</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
        background:#0f172a;
        color:white;
        font-family:Arial;
        }

        .chat-container{
        max-width:900px;
        margin:auto;
        height:90vh;
        display:flex;
        flex-direction:column;
        }

        .chat-header{
        padding:15px;
        font-size:20px;
        font-weight:bold;
        border-bottom:1px solid #333;
        }

        .chat-box{
        flex:1;
        overflow-y:auto;
        padding:20px;
        }

        .message{
        margin-bottom:15px;
        display:flex;
        }

        .user{
        justify-content:flex-end;
        }

        .ai{
        justify-content:flex-start;
        }

        .bubble{
        padding:12px 15px;
        border-radius:15px;
        max-width:70%;
        }

        .user .bubble{
        background:#2563eb;
        color:white;
        }

        .ai .bubble{
        background:#1e293b;
        }

        .input-area{
        display:flex;
        padding:10px;
        border-top:1px solid #333;
        }

        #msg{
        flex:1;
        padding:10px;
        border-radius:10px;
        border:none;
        outline:none;
        }

        .send-btn{
        margin-left:10px;
        background:#2563eb;
        color:white;
        border:none;
        padding:10px 20px;
        border-radius:10px;
        }

        .loading{
        font-style:italic;
        opacity:0.7;
        }

    </style>

</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        🤖 RAG AI Assistant
    </div>

    <div id="chat" class="chat-box"></div>

    <div class="input-area">

        <input id="msg" placeholder="Ask anything..." />

        <button class="send-btn" onclick="send()">Send</button>

    </div>

</div>

<script>

    document.getElementById("msg").addEventListener("keypress",function(e){
    if(e.key==="Enter"){
    send();
    }
    });

    async function send(){

    let msg=document.getElementById("msg").value;

    if(!msg)return;

    let chat=document.getElementById("chat");

    chat.innerHTML+=`
    <div class="message user">
    <div class="bubble">${msg}</div>
    </div>
    `;

    document.getElementById("msg").value="";

    chat.innerHTML+=`
    <div class="message ai loading" id="loading">
    <div class="bubble">AI is thinking...</div>
    </div>
    `;

    chat.scrollTop=chat.scrollHeight;

    let res=await fetch("/api/chat",{
    method:"POST",
    body:msg
    });

    let text=await res.text();

    document.getElementById("loading").remove();

    chat.innerHTML+=`
    <div class="message ai">
    <div class="bubble">${text}</div>
    </div>
    `;

    chat.scrollTop=chat.scrollHeight;

    }

</script>

</body>
</html>
