<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>RAG AI Assistant</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
        background:#f1f3f6;
        font-family: "Segoe UI", Arial;
        }

        /* Sidebar */

        .sidebar{
        height:100vh;
        background:#0f172a;
        color:white;
        padding:20px;
        }

        .sidebar h4{
        color:#38bdf8;
        font-weight:600;
        }

        .sidebar button{
        border-radius:8px;
        }

        /* Chat container */

        .chat-container{
        height:75vh;
        overflow-y:auto;
        background:white;
        padding:25px;
        border-radius:12px;
        box-shadow:0 4px 20px rgba(0,0,0,0.08);
        }

        /* Messages */

        .user-msg{
        text-align:right;
        margin-bottom:15px;
        }

        .ai-msg{
        text-align:left;
        margin-bottom:15px;
        }

        .msg-bubble{
        display:inline-block;
        padding:12px 16px;
        border-radius:16px;
        max-width:70%;
        font-size:14px;
        line-height:1.5;
        }

        /* User bubble */

        .user-bubble{
        background:#2563eb;
        color:white;
        border-bottom-right-radius:4px;
        }

        /* AI bubble */

        .ai-bubble{
        background:#e2e8f0;
        border-bottom-left-radius:4px;
        }

        /* Input */

        .input-area{
        margin-top:15px;
        }

        .input-area input{
        border-radius:30px;
        padding:12px;
        }

        .input-area button{
        border-radius:30px;
        padding-left:20px;
        padding-right:20px;
        }

        /* AI typing */

        .typing{
        font-size:13px;
        color:gray;
        font-style:italic;
        }

        /* Upload section */

        .upload-box{
        background:white;
        padding:15px;
        border-radius:10px;
        box-shadow:0 3px 10px rgba(0,0,0,0.08);
        margin-bottom:20px;
        }

    </style>

</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->

        <div class="col-md-2 sidebar">

            <h4>🤖 RAG AI</h4>

            <hr>

            <div class="upload-box">

                <p><b>Upload Knowledge</b></p>

                <input type="file" id="file" class="form-control mb-2">

                <button class="btn btn-success w-100 mb-3" onclick="uploadFile()">Upload File</button>

                <input id="url" class="form-control mb-2" placeholder="Website URL">

                <button class="btn btn-warning w-100" onclick="uploadUrl()">Upload Website</button>

            </div>

            <p>Supported:</p>

            <ul>
                <li>PDF</li>
                <li>DOCX</li>
                <li>TXT</li>
                <li>Website</li>
            </ul>

        </div>


        <!-- Chat Area -->

        <div class="col-md-10 p-4">

            <h3>AI Knowledge Assistant</h3>

            <div id="chat" class="chat-container"></div>

            <div class="input-area">

                <div class="input-group">

                    <input id="msg" class="form-control" placeholder="Ask AI anything...">

                    <button class="btn btn-primary" onclick="send()">Send</button>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

    /* ENTER key send */

    document.getElementById("msg").addEventListener("keypress", function(e){
        if(e.key === "Enter"){
            e.preventDefault();
            send();
        }
    });

    function send(){

        let msg = document.getElementById("msg").value;

        if(msg.trim() === "") return;

        let chat = document.getElementById("chat");

        /* USER MESSAGE */

        chat.innerHTML += `
        <div class="user-msg">
            <div class="msg-bubble user-bubble">${msg}</div>
        </div>
        `;

        document.getElementById("msg").value="";

        /* AI MESSAGE BOX */

        let aiId = "ai-" + Date.now();

        chat.innerHTML += `
        <div class="ai-msg">
            <div id="${aiId}" class="msg-bubble ai-bubble typing">AI is thinking...</div>
        </div>
        `;

        chat.scrollTop = chat.scrollHeight;

        /* SSE STREAM CALL */

        let bubble = document.getElementById(aiId);

        let source = new EventSource("/ask?q=" + encodeURIComponent(msg));

        bubble.innerHTML = "";

        source.onmessage = function(event){

            bubble.innerHTML += event.data;

            chat.scrollTop = chat.scrollHeight;
        };

        source.onerror = function(){

            source.close();
        };

    }


    /* Upload File */

    async function uploadFile(){

        let file=document.getElementById("file").files[0];

        if(!file){
            alert("Select file");
            return;
        }

        let formData=new FormData();
        formData.append("file",file);

        await fetch("/upload",{
            method:"POST",
            body:formData
        });

        alert("File uploaded to AI knowledge base");
    }


    /* Upload Website */

    async function uploadUrl(){

        let url=document.getElementById("url").value;

        if(url===""){
            alert("Enter URL");
            return;
        }

        await fetch("/upload-url?url="+encodeURIComponent(url),{
            method:"POST"
        });

        alert("Website content added");
    }

</script>

</body>
</html>
