<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>RAG AI Assistant</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    body{
    background:#f4f6f9;
    font-family:Arial;
    }

    .sidebar{
    height:100vh;
    background:#1e1e2f;
    color:white;
    padding:20px;
    }

    .sidebar h4{
    color:#00d4ff;
    }

    .chat-container{
    height:70vh;
    overflow-y:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    .user-msg{
    text-align:right;
    margin:10px;
    }

    .ai-msg{
    text-align:left;
    margin:10px;
    }

    .msg-bubble{
    display:inline-block;
    padding:10px 15px;
    border-radius:15px;
    max-width:70%;
    }

    .user-bubble{
    background:#007bff;
    color:white;
    }

    .ai-bubble{
    background:#e9ecef;
    }

    .input-area{
    margin-top:10px;
    }

    .upload-box{
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

  </style>

</head>

<body>

<div class="container-fluid">

  <div class="row">

    <!-- Sidebar -->

    <div class="col-md-2 sidebar">

      <h4>🤖 RAG AI</h4>

      <hr>

      <p>Knowledge Upload</p>

      <input type="file" id="file" class="form-control mb-2">

      <button class="btn btn-success w-100 mb-3" onclick="uploadFile()">Upload File</button>

      <input id="url" class="form-control mb-2" placeholder="Enter website URL">

      <button class="btn btn-warning w-100" onclick="uploadUrl()">Upload Website</button>

      <hr>

      <p>Supported:</p>

      <ul>
        <li>PDF</li>
        <li>DOCX</li>
        <li>TXT</li>
        <li>Website</li>
      </ul>

    </div>


    <!-- Chat Area -->

    <div class="col-md-10 p-4">

      <h3>AI Knowledge Assistant</h3>

      <div id="chat" class="chat-container"></div>

      <div class="input-area">

        <div class="input-group">

          <input id="msg" class="form-control" placeholder="Ask anything...">

          <button class="btn btn-primary" onclick="send()">Send</button>

        </div>

      </div>

    </div>

  </div>

</div>

<script>

  document.getElementById("msg").addEventListener("keypress", function(event){

      if(event.key === "Enter"){
          event.preventDefault();
          send();
      }

  });

  async function send(){

    let msg=document.getElementById("msg").value;

    if(msg.trim()=="") return;

    let chat=document.getElementById("chat");

    chat.innerHTML+=`
    <div class="user-msg">
    <div class="msg-bubble user-bubble">${msg}</div>
    </div>
    `;

    document.getElementById("msg").value="";

    let res=await fetch("/api/chat",{
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:msg
    });

    let text=await res.text();

    chat.innerHTML+=`
    <div class="ai-msg">
    <div class="msg-bubble ai-bubble">${text}</div>
    </div>
    `;

    chat.scrollTop=chat.scrollHeight;

  }

  async function uploadFile(){

    let file=document.getElementById("file").files[0];

    if(!file){
    alert("Select file");
    return;
    }

    let formData=new FormData();
    formData.append("file",file);

    await fetch("/upload",{
    method:"POST",
    body:formData
    });

    alert("File uploaded to AI knowledge base");

  }

  async function uploadUrl(){

    let url=document.getElementById("url").value;

    if(url==""){
    alert("Enter URL");
    return;
    }

    await fetch("/upload-url?url="+url,{
    method:"POST"
    });

    alert("Website content added");

  }

</script>


</body>
</html>
