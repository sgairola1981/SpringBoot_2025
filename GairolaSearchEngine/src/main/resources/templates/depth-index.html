<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Depth Indexer Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: #1e293b;
            color: white;
            padding-top: 20px;
        }

        .sidebar a {
            color: #cbd5e1;
            padding: 12px 20px;
            display: block;
            text-decoration: none;
            transition: 0.2s;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #334155;
            color: white;
        }

        .content {
            margin-left: 240px;
            padding: 30px;
        }

        .card-dashboard {
            border-radius: 16px;
            border: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
        }

        .progress {
            height: 18px;
            border-radius: 10px;
        }

        .tree-view {
            max-height: 400px;
            overflow-y: auto;
        }

        .badge-status-running {
            background: #10b981;
        }

        .badge-status-completed {
            background: #f59e0b;
        }

        .badge-status-idle {
            background: #64748b;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4 class="text-center mb-4">
        <i class="bi bi-speedometer2"></i> Admin Panel
    </h4>

    <a th:href="@{/}" class="active">
        <i class="bi bi-house-door me-2"></i>Search Data
    </a>

      <a th:href="@{/depth-index}">
        <i class="bi bi-diagram-3 me-2"></i>Depth Index
    </a>
</div>

<!-- Content -->
<div class="content">

    <!-- Top Navbar -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Depth Index Dashboard</h3>

        <span class="badge fs-6 px-3 py-2"
              th:classappend="
                ${status == 'running'} ? 'badge-status-running' :
                (${status == 'completed'} ? 'badge-status-completed' : 'badge-status-idle')"
              th:text="'Status: ' + (${status} ?: 'idle')">
        </span>
    </div>

    <!-- Stats Row -->
    <div class="row g-4 mb-4">

        <div class="col-md-3">
            <div class="card card-dashboard p-3">
                <div>Total Pages</div>
                <div class="stat-number" th:text="${totalPages} ?: 0"></div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-dashboard p-3">
                <div>Unique URLs</div>
                <div class="stat-number" th:text="${uniqueUrls} ?: 0"></div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-dashboard p-3">
                <div>Depth 1</div>
                <div class="stat-number" th:text="${depth1Count} ?: 0"></div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card card-dashboard p-3">
                <div>Depth 2</div>
                <div class="stat-number" th:text="${depth2Count} ?: 0"></div>
            </div>
        </div>

    </div>

    <!-- Progress Section -->
    <div class="card card-dashboard p-4 mb-4"
         th:if="${status == 'running'}">

        <h5 class="mb-3">
            <i class="bi bi-activity me-2"></i>Live Indexing Progress
        </h5>

        <div class="progress mb-2">
            <div class="progress-bar bg-success"
                 th:style="'width: ' + (${progress} ?: 0) + '%'">
            </div>
        </div>

        <div class="d-flex justify-content-between">
            <small th:text="${progress} + '%'"></small>
            <small th:text="'Page ' + ${currentPage} + '/' + ${totalPages}"></small>
        </div>

        <div class="mt-3">
            <a th:href="@{/depth-index/stop}"
               class="btn btn-danger btn-sm">
                <i class="bi bi-stop-circle"></i> Stop
            </a>
        </div>
    </div>

    <!-- Start Index Form -->
    <div class="card card-dashboard p-4 mb-4"
         th:if="${status == 'idle' or status == 'completed'}">

        <h5 class="mb-3">
            <i class="bi bi-play-circle me-2"></i>Start New Indexing
        </h5>

        <form th:action="@{/depth-index/start}" method="get">
            <div class="input-group">
                <input type="url"
                       name="url"
                       class="form-control"
                       placeholder="https://spring.io"
                       required>
                <button class="btn btn-success">
                    Start Index
                </button>
            </div>
        </form>
    </div>

    <!-- Tree Section -->
    <div class="card card-dashboard p-4">
        <h5 class="mb-3">
            <i class="bi bi-diagram-3 me-2"></i>Indexed Pages Tree
        </h5>

        <div class="tree-view">

            <div th:if="${indexedPages != null and !indexedPages.isEmpty()}"
                 th:each="page : ${indexedPages}"
                 class="mb-2">

                <div class="border-start ps-3"
                     th:style="'margin-left:' + (${page.depth} * 20) + 'px'">

                    <strong th:text="${page.title} ?: 'Untitled'"></strong>
                    <br>
                    <small class="text-muted"
                           th:text="${page.url}"></small>

                </div>
            </div>

            <div th:if="${indexedPages == null or indexedPages.isEmpty()}"
                 class="text-muted text-center">
                No pages indexed yet.
            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:if="${status == 'running'}">
    setTimeout(() => location.reload(), 3000);
</script>

</body>
</html>
