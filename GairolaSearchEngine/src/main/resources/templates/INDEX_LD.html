<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Search Engine - Index & Search Websites</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-primary: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-light: #e2e8f0;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .main-container {
            max-width: 1000px;
            margin: auto;
            padding: 2rem 1rem;
        }

        /* Logo */
        .logo {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800;
            background: var(--primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .tagline {
            color: var(--text-secondary);
        }

        /* Search Section */
        .search-section {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 70px rgba(0,0,0,0.1);
            border: 1px solid var(--border-light);
            margin: 3rem 0;
        }

        .search-input {
            border-radius: 20px;
            padding: 1.2rem 1.6rem;
            border: 2px solid var(--border-light);
            font-size: 1.1rem;
            transition: 0.3s ease;
        }

        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.15);
        }

        .search-btn {
            border-radius: 20px;
            padding: 1.2rem 2.5rem;
            background: var(--primary);
            border: none;
            color: white;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .search-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(102,126,234,0.4);
        }

        /* Search Cards */
        .search-card {
            border-radius: 20px;
            background: white;
            border: 1px solid var(--border-light);
            padding: 2rem;
            margin-bottom: 2rem;
            transition: all 0.35s ease;
            box-shadow: 0 10px 35px rgba(0,0,0,0.06);
        }

        .search-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.12);
            border-color: rgba(102, 126, 234, 0.25);
        }

        .search-title a {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(90deg, #1e40af, #667eea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .search-title a:hover {
            opacity: 0.8;
        }

        .search-url {
            font-size: 0.9rem;
            color: #0f9d58;
            word-break: break-all;
            margin-bottom: 0.8rem;
        }

        .search-snippet {
            color: #475569;
            font-size: 1rem;
            line-height: 1.7;
        }

        .meta-info {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .action-buttons .btn {
            border-radius: 20px;
            padding: 4px 14px;
        }

        /* Pagination */
        .pagination .page-link {
            border-radius: 12px !important;
            margin: 0 5px;
            border: 1px solid var(--border-light);
            color: var(--text-primary);
        }

        .pagination .page-item.active .page-link {
            background: var(--primary);
            border: none;
            color: white;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem;
            background: white;
            border-radius: 24px;
            border: 2px dashed var(--border-light);
        }

        @media(max-width:768px){
            .search-section { padding:2rem 1.5rem; }
            .search-card { padding:1.5rem; }
        }
    </style>
</head>
<body>

<div class="main-container">

    <!-- Header -->
    <div class="text-center">
        <h1 class="logo">🔍 AI Search</h1>
        <p class="tagline">Index websites • Search content • Instant results</p>
    </div>

    <!-- Search Box -->
    <div class="search-section">
        <form>
            <div class="input-group">
                <input type="text"
                       name="q"
                       th:value="${query}"
                       class="form-control search-input"
                       placeholder="Search indexed content..."
                       autocomplete="off"/>
                <button type="submit" formaction="/searchN" class="search-btn">
                    <i class="bi bi-search me-2"></i>Search
                </button>
            </div>
        </form>
    </div>

    <!-- Results -->
    <div th:if="${results != null and !#lists.isEmpty(results)}">

        <div th:each="result : ${results}" class="search-card">

            <h5 class="search-title">
                <a th:href="${result.url}" th:text="${result.title}" target="_blank"></a>
            </h5>

            <div class="search-url">
                <i class="bi bi-link-45deg"></i>
                <span th:text="${result.url}"></span>
            </div>

            <p class="search-snippet"
               th:text="${#strings.abbreviate(result.content, 200)}"></p>

            <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2">

                <div class="meta-info">
                    <i class="bi bi-clock"></i>
                    <span th:text="${#temporals.format(result.scrapedAt, 'MMM dd, yyyy HH:mm')}"></span>
                    •
                    <span th:text="${result.depth == 0 ? 'Homepage' : 'Depth ' + result.depth}"></span>
                </div>

                <div class="action-buttons">
                    <a th:href="${result.url}" target="_blank"
                       class="btn btn-sm btn-primary me-2">Visit</a>

                    <button class="btn btn-sm btn-outline-secondary"
                            th:attr="data-url=${result.url}"
                            onclick="copyUrl(this)">
                        <i class="bi bi-copy"></i>
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- Empty State -->
    <div th:if="${results == null or #lists.isEmpty(results)}"
         class="empty-state mt-4">
        <i class="bi bi-search display-4 text-muted"></i>
        <p class="mt-3 text-muted">No results found. Try a different keyword.</p>
    </div>

    <!-- Pagination -->
    <nav th:if="${page != null and page.totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">

            <li class="page-item" th:classappend="${page.first}? 'disabled'">
                <a class="page-link"
                   th:href="@{/searchN(q=${query}, page=${page.number - 1}, size=${page.size})}">
                    <i class="bi bi-chevron-left"></i>
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(1, page.totalPages)}"
                th:classappend="${i == page.number + 1}? 'active'">
                <a class="page-link"
                   th:text="${i}"
                   th:href="@{/searchN(q=${query}, page=${i - 1}, size=${page.size})}">
                </a>
            </li>

            <li class="page-item" th:classappend="${page.last}? 'disabled'">
                <a class="page-link"
                   th:href="@{/searchN(q=${query}, page=${page.number + 1}, size=${page.size})}">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </li>

        </ul>
    </nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Auto focus search
    const searchInput = document.querySelector('input[name="q"]');
    if (searchInput) searchInput.focus();

    // Copy URL
    function copyUrl(btn) {
        const url = btn.getAttribute("data-url");
        navigator.clipboard.writeText(url).then(() => {
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="bi bi-check-lg"></i>';
            btn.classList.add("btn-success");
            setTimeout(() => {
                btn.innerHTML = original;
                btn.classList.remove("btn-success");
            }, 1500);
        });
    }

    // Smooth scroll after search
    if (window.location.search.includes('q=')) {
        setTimeout(() => {
            document.querySelector('.search-card, .empty-state')?.scrollIntoView({
                behavior: 'smooth'
            });
        }, 500);
    }
</script>

</body>
</html>
